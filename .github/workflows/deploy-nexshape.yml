# Pipeline de validação pré-deploy e artefacto opcional (Laravel NexShape).
# O deploy FTP/manual em produção segue docs/DEPLOY_NEXSHAPE.md.

name: Deploy NexShape (validate)

on:
  push:
    branches: [main, MAPL_0004]
    paths:
      - "laravel-app/**"
      - ".github/workflows/deploy-nexshape.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: laravel-app

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_mysql, curl, fileinfo
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: laravel-app/package-lock.json

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run PHPStan
        run: composer phpstan

      - name: Run PHPUnit
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: nexshape-public-build
          path: laravel-app/public/build/
          if-no-files-found: error

  backup-restore-reminder:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Backup restore checklist
        run: |
          echo "Após deploy: executar teste de restore documentado em docs/DEPLOY_NEXSHAPE.md (secção Backup e restore)."
