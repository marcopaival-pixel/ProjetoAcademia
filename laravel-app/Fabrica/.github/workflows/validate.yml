name: Validate artifacts

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Builder smoke
        run: npm run validate -- outputs/_smoke
      - name: Audit smoke
        run: npm run validate -- outputs/_smoke-audit
      - name: Auto Evolution smoke
        run: npm run validate -- outputs/_smoke-evolution
